# Phase 1a candidate registry. Validated entries graduate to FidMap.kt.
#
# Status:  validated | candidate | deferred | unknown | dropped
# Decoder: int_raw | int_scaled (needs scale) | int_percent | int_enum |
#          int_temp_c | int_kpa | float_volt | float_percent | float_kw |
#          float_kwh | static_user_setting
# Source must be neutral: fid-registry | autoservice-catalog |
#                         reference-catalog | logcat-probe

# ── Core energy + drive (validated S3) ───────────────────────────────────

- param: SOC
  diplus_key: SOC
  device: 1014
  fid: 1246777400
