# Phase 1a candidate registry. Validated entries graduate to FidMap.kt.
#
# Status:  validated | candidate | deferred | unknown | dropped
# Decoder: int_raw | int_scaled (needs scale) | int_percent | int_enum |
#          int_temp_c | int_kpa | float_volt | float_percent | float_kw |
#          float_kwh | static_user_setting
# Source must be neutral: fid-registry | autoservice-catalog |
#                         reference-catalog | logcat-probe

# ── Core energy + drive (validated S3) ───────────────────────────────────

- param: SOC
  diplus_key: SOC
  device: 1014
  fid: 1246777400
  transact: 7
  decoder: float_percent
  unit: "%"
  status: validated
  source: fid-registry

- param: Speed
  diplus_key: Speed
  device: 1013
  fid: -1807745016
  transact: 7
  decoder: float_kw
  unit: "km/h"
  status: validated
  source: fid-registry
  note: "Live km/h. Dynamic 0/30/64.5 in drive S3."

- param: Mileage
  diplus_key: Mileage
  device: 1014
  fid: 1246765072
  transact: 5
  decoder: int_scaled
  scale: 0.1
  unit: "km"
  status: validated
  source: fid-registry
  note: "Raw 37998 → 3799.8 km. Panel shows 3799.8 km."

- param: Power
  diplus_key: Power
  device: 1012
  fid: 339738656
  transact: 5
  decoder: int_raw
  unit: "kW"
  status: validated
  source: fid-registry
  note: "Signed int kW. Regen negative, accel positive (-28..+67 observed)."

- param: TotalElecCon
  diplus_key: TotalElecCon
  device: 1014
  fid: 1032871984
  transact: 7
  decoder: float_kwh
  unit: "kWh"
  status: validated
  source: fid-registry
  note: "Monotonic during drive; frozen in park."

- param: Voltage12V
  diplus_key: Voltage12V
  device: 1001
  fid: 1128267816
  transact: 7
  decoder: float_volt
  unit: "V"
  status: validated
  source: fid-registry
  note: "12V aux. 13.5-13.6 V observed."

